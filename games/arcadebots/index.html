<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base id="arcade-base" href="./" />
    <script>
      (function () {
        var p = document.location.pathname;
        var base = document.getElementById('arcade-base');
        if (p && !/\/index\.html?$/i.test(p) && !/\/$/.test(p)) {
          base.href = p + '/';
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Bot</title>
    <script src="/js/retro-stack-badge.js"></script>
    <script type="module" src="/src/main.ts"></script>

    <style>
      body {
        background: black;
        margin: 0;
        padding: 0;
      }
      #game-container {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (window.RetroStackBadge) RetroStackBadge.initGameGate({});
      });
    </script>
  </body>
</html>
