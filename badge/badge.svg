<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#45ffb1"/>
      <stop offset="50%" style="stop-color:#3cf5ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#g)" stroke="url(#neon)" stroke-width="6"/>
  <g filter="url(#glow)">
    <rect x="96" y="120" width="320" height="24" rx="6" fill="url(#neon)" opacity="0.95"/>
    <rect x="96" y="188" width="320" height="24" rx="6" fill="url(#neon)" opacity="0.85"/>
    <rect x="96" y="256" width="320" height="24" rx="6" fill="url(#neon)" opacity="0.75"/>
  </g>
  <text x="256" y="360" text-anchor="middle" fill="#e8fffa" font-family="system-ui,sans-serif" font-weight="800" font-size="36" letter-spacing="0.15em">RETRO STACK</text>
  <text x="256" y="400" text-anchor="middle" fill="#45ffb1" font-family="system-ui,sans-serif" font-weight="600" font-size="18" letter-spacing="0.35em">PLAYER BADGE</text>
</svg>
